name: Daily Mod Index Sync

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run Sync Script
        run: python sync_index.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'JokerDeckIndexer'
          git config --global user.email 'indexer@jokerdeck.internal'
          
          # Only commit if changes were actually found in mod.json
          if ! git diff --exit-code mod.json; then
            git add mod.json
            git commit -m "chore: automatic daily manifest version sync"
            git push origin main
          else
            # Changed 'print' to 'echo' so bash doesn't throw a 127 error
            echo "No mod updates found today."
          fi
